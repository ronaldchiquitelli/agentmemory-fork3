services:
  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENTMEMORY_VERSION: "0.9.28"
        III_VERSION: "0.11.2"
        III_SDK_VERSION: "0.11.2"
    restart: unless-stopped
    environment:
      # Viewer bind address — 0.0.0.0 makes it reachable through the
      # Coolify proxy. The viewer requires AGENTMEMORY_SECRET (generated
      # on first boot) and explicit VIEWER_ALLOWED_HOSTS when bound to
      # a non-loopback address.
      AGENTMEMORY_VIEWER_HOST: "0.0.0.0"

      # Host-header allowlist: the viewer only accepts requests whose
      # Host header matches one of these values. This is the defence
      # against DNS rebinding when the viewer is network-reachable.
      # We need both with and without port: Coolify's Traefik strips the
      # port from the Host header when it terminates TLS on 443, so the
      # viewer receives "viewer.memory.etell.com.br" (no port).
      # Set these in Coolify's Environment Variables tab:
      #   AGENTMEMORY_FQDN=memory.etell.com.br
      #   VIEWER_FQDN=viewer.memory.etell.com.br
      VIEWER_ALLOWED_HOSTS: "${VIEWER_FQDN}:3113,${VIEWER_FQDN},localhost:3113,127.0.0.1:3113"

      # CORS origins for viewer responses (both the HTML page and the
      # REST API proxy responses it generates).
      VIEWER_ALLOWED_ORIGINS: "https://${VIEWER_FQDN},http://localhost:3113,http://127.0.0.1:3113"
    ports:
      # Porta 3111 para o REST API — Coolify roteia domínios :3111 para cá
      - "3111:3111"
      # Porta 3113 para o Viewer — Coolify roteia domínios :3113 para cá
      - "3113:3113"
    labels:
      # Basic Auth middleware — protege ambos os domínios (MCP + Viewer)
      - "traefik.http.middlewares.viewer-auth.basicauth.users=admin:$apr1$100q760X$/LrA6Vt7WJajFuXPP4/iR0"
      - "traefik.http.middlewares.viewer-auth.basicauth.realm=agentmemory"
      # Viewer — Traefik HTTPS router (com Basic Auth, todas as rotas)
      - "traefik.http.routers.agentmemory-viewer.entryPoints=https"
      - "traefik.http.routers.agentmemory-viewer.rule=Host(`viewer.memory.etell.com.br`)"
      - "traefik.http.routers.agentmemory-viewer.tls=true"
      - "traefik.http.routers.agentmemory-viewer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.agentmemory-viewer.service=agentmemory-viewer"
      - "traefik.http.routers.agentmemory-viewer.middlewares=viewer-auth"
      - "traefik.http.services.agentmemory-viewer.loadbalancer.server.port=3113"
      # Viewer — HTTP → HTTPS redirect
      - "traefik.http.routers.agentmemory-viewer-http.entryPoints=http"
      - "traefik.http.routers.agentmemory-viewer-http.rule=Host(`viewer.memory.etell.com.br`)"
      - "traefik.http.routers.agentmemory-viewer-http.middlewares=redirect-to-https"
    volumes:
      - agentmemory-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3111/agentmemory/livez || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agentmemory-data:
